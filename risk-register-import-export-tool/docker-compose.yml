version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "${AI_SERVICE_PORT:-5000}:5000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - .env

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-risk_register_import_export_tool_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
